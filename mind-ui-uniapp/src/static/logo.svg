<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0e6ff"/>
      <stop offset="100%" stop-color="#e0f0ff"/>
    </linearGradient>
    <linearGradient id="heart" x1="120" y1="80" x2="392" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="inner" x1="180" y1="180" x2="340" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- 外圈光环 -->
  <circle cx="256" cy="256" r="224" stroke="url(#heart)" stroke-width="4" opacity="0.25"/>

  <!-- 心形主体 -->
  <path d="M256 420
           C256 420, 100 310, 100 210
           C100 140, 150 95, 210 95
           C245 95, 256 120, 256 120
           C256 120, 267 95, 302 95
           C362 95, 412 140, 412 210
           C412 310, 256 420, 256 420Z"
        fill="url(#heart)"
        filter="url(#glow)"/>

  <!-- 内部数字孪生/脑波线条 -->
  <path d="M170 230 Q200 190 230 230 T290 230 T340 230"
        stroke="url(#inner)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M190 280 Q220 250 250 280 T310 280 T350 280"
        stroke="url(#inner)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M210 330 Q235 310 260 330 T300 330"
        stroke="url(#inner)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- 中心光点 -->
  <circle cx="256" cy="256" r="18" fill="#ffffff" opacity="0.9"/>
  <circle cx="256" cy="256" r="8" fill="#c084fc" opacity="0.6"/>
</svg>